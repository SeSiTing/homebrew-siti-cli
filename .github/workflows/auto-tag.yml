name: Auto Tag

on:
  push:
    branches: [main]

jobs:
  auto-tag:
    # 跳过 bot 提交，避免循环触发
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^VERSION=' bin/siti | head -1 | cut -d'"' -f2)
          if [ -z "$VERSION" ]; then
            echo "❌ 无法从 bin/siti 提取版本号" >&2
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "当前代码版本: v$VERSION"

      - name: Check if tag exists
        id: check_tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q "refs/tags/v$VERSION"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "标签 v$VERSION 已存在，跳过"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "标签 v$VERSION 不存在，准备创建"
          fi

      - name: Create temp tag to generate archive
        if: steps.check_tag.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # 用临时名字打 tag，让 GitHub 生成 archive 用于计算 sha256
          git tag "_tmp_v$VERSION"
          git push origin "_tmp_v$VERSION"

      - name: Calculate SHA256
        if: steps.check_tag.outputs.exists == 'false'
        id: calc_sha
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          URL="https://github.com/${{ github.repository }}/archive/_tmp_v${VERSION}.tar.gz"
          for i in $(seq 1 10); do
            curl -sL "$URL" -o archive.tar.gz
            SIZE=$(stat -c%s archive.tar.gz 2>/dev/null || stat -f%z archive.tar.gz)
            if [ "$SIZE" -gt 1024 ]; then
              break
            fi
            echo "⏳ archive 未就绪，等待 10s（第 $i 次）..."
            sleep 10
          done
          SHA256=$(sha256sum archive.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "📦 SHA256: $SHA256"

      - name: Update Formula and create real tag
        if: steps.check_tag.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.calc_sha.outputs.sha256 }}
        run: |
          # 更新 Formula
          sed -i "s|url \".*\"|url \"https://github.com/${{ github.repository }}/archive/v${VERSION}.tar.gz\"|" Formula/siti-cli.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/siti-cli.rb

          echo "✅ Formula 已更新:"
          grep -E "url|sha256" Formula/siti-cli.rb | head -2

          # commit 更新后的 Formula 到 main
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Formula/siti-cli.rb
          git commit -m "chore(formula): update to v${VERSION}"
          git pull --rebase origin main
          git push origin HEAD:main

          # 在包含正确 Formula 的 commit 上打正式 tag
          git tag "v$VERSION"
          git push origin "v$VERSION"

          # 清理临时 tag
          git push origin --delete "_tmp_v$VERSION"

          echo "✅ 标签 v$VERSION 创建成功（Formula sha256 已包含）"
